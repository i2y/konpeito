name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-20 clang-20 libllvm20

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true
      - run: bundle exec rubocop

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-20 clang-20 libllvm20

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Run unit tests (non-codegen)
        run: bundle exec rake test

      - name: Check environment (konpeito doctor)
        run: bundle exec ruby -Ilib bin/konpeito doctor --no-color
        continue-on-error: true

      - name: Diagnose native compilation pipeline
        run: bundle exec rake test:diagnose

      - name: Run codegen tests
        run: bundle exec rake test:codegen

  test-macos:
    name: macOS ARM Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM 20
        run: |
          brew install llvm@20
          echo "/opt/homebrew/opt/llvm@20/bin" >> $GITHUB_PATH
          ln -sf /opt/homebrew/opt/llvm@20/lib/libLLVM-20.dylib /opt/homebrew/lib/

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Diagnose native compilation pipeline
        run: bundle exec rake test:diagnose

      - name: Run unit tests (non-codegen)
        run: bundle exec rake test

      - name: Run codegen tests
        run: bundle exec rake test:codegen

  test-mruby:
    name: mruby Build Tests (${{ matrix.mruby-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        mruby-version: [homebrew, source-4.x]
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM 20
        run: |
          brew install llvm@20
          echo "/opt/homebrew/opt/llvm@20/bin" >> $GITHUB_PATH
          ln -sf /opt/homebrew/opt/llvm@20/lib/libLLVM-20.dylib /opt/homebrew/lib/

      - name: Install mruby (Homebrew)
        if: matrix.mruby-version == 'homebrew'
        run: brew install mruby

      - name: Install mruby 4.x (from source)
        if: matrix.mruby-version == 'source-4.x'
        run: |
          git clone --depth 1 --branch 4.0.0-rc2 https://github.com/mruby/mruby.git /tmp/mruby-src
          cd /tmp/mruby-src && rake
          echo "MRUBY_DIR=/tmp/mruby-src/build/host" >> $GITHUB_ENV

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Check mruby environment
        run: |
          bundle exec ruby -Ilib bin/konpeito doctor --target mruby --no-color
        continue-on-error: true

      - name: Test mruby build and run
        run: |
          cat > /tmp/mruby_test.rb << 'RUBY'
          def add(a, b)
            a + b
          end
          puts add(3, 4)
          RUBY
          bundle exec ruby -Ilib bin/konpeito run --target mruby /tmp/mruby_test.rb

  conformance:
    name: Conformance Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-20 clang-20 libllvm20

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Run conformance tests
        run: bundle exec rake conformance
