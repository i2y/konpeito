name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-20 clang-20 libllvm20

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true
      - run: bundle exec rubocop

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-20 clang-20 libllvm20

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Run unit tests (non-codegen)
        run: bundle exec rake test

      - name: Check environment (konpeito doctor)
        run: bundle exec ruby -Ilib bin/konpeito doctor --no-color
        continue-on-error: true

      - name: Diagnose native compilation pipeline
        run: bundle exec rake test:diagnose

      - name: Run codegen tests
        run: bundle exec rake test:codegen

  test-macos:
    name: macOS ARM Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM 20
        run: brew install llvm@20

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Diagnose native compilation pipeline
        run: bundle exec rake test:diagnose

      - name: Run unit tests (non-codegen)
        run: bundle exec rake test

      - name: Run codegen tests
        run: bundle exec rake test:codegen

  test-mruby:
    name: mruby Build Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM 20 and mruby
        run: |
          brew install llvm@20 mruby

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Check mruby environment
        run: |
          mruby-config --cflags
          mruby-config --ldflags --libs
          bundle exec ruby -Ilib bin/konpeito doctor --target mruby --no-color
        continue-on-error: true

      - name: Test mruby build and run
        run: |
          cat > /tmp/mruby_test.rb << 'RUBY'
          def add(a, b)
            a + b
          end
          puts add(3, 4)
          RUBY
          bundle exec ruby -Ilib bin/konpeito run --target mruby /tmp/mruby_test.rb

  conformance:
    name: Conformance Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-20 clang-20 libllvm20

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Run conformance tests
        run: bundle exec rake conformance
